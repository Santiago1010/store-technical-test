server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gateway_db}
    username: ${DB_USER:gateway_user}
    password: ${DB_PASSWORD:gateway_pass}

  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gateway_db}
    user: ${DB_USER:gateway_user}
    password: ${DB_PASSWORD:gateway_pass}
    locations: classpath:db/migration

  cloud:
    gateway:
      default-filters:
        - AddResponseHeader=X-Gateway, api-gateway
      routes:
        - id: products-service
          uri: ${PRODUCTS_SERVICE_URL}
          predicates:
            - Path=/api/v1/products/**
          filters:
            - StripPrefix=0

        - id: inventory-purchases
          uri: ${INVENTORY_SERVICE_URL}
          predicates:
            - Path=/api/v1/purchases/**
          filters:
            - StripPrefix=0

        - id: inventory-query
          uri: ${INVENTORY_SERVICE_URL}
          predicates:
            - Path=/api/v1/inventory/**
          filters:
            - StripPrefix=0

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    org.springframework.cloud.gateway: INFO