server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway

  r2dbc:
    url: r2dbc:postgresql://${GATEWAY_DB_HOST:localhost}:${GATEWAY_DB_PORT:5432}/${GATEWAY_DB_NAME:gateway_db}
    username: ${GATEWAY_DB_USER:gateway_user}
    password: ${GATEWAY_DB_PASSWORD:gateway_pass}

  flyway:
    url: jdbc:postgresql://${GATEWAY_DB_HOST:localhost}:${GATEWAY_DB_PORT:5432}/${GATEWAY_DB_NAME:gateway_db}
    user: ${GATEWAY_DB_USER:gateway_user}
    password: ${GATEWAY_DB_PASSWORD:gateway_pass}
    locations: classpath:db/migration

  cloud:
    gateway:
      default-filters:
        - AddResponseHeader=X-Gateway, api-gateway

      routes:
        - id: products-service
          uri: ${PRODUCTS_SERVICE_URL}
          predicates:
            - Path=/api/v1/products/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-API-Key, ${API_KEY_SECRET}

        - id: inventory-purchases
          uri: ${INVENTORY_SERVICE_URL}
          predicates:
            - Path=/api/v1/purchases/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-API-Key, ${API_KEY_SECRET}

        - id: inventory-query
          uri: ${INVENTORY_SERVICE_URL}
          predicates:
            - Path=/api/v1/inventory/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-API-Key, ${API_KEY_SECRET}

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

api:
  key:
    secret: ${API_KEY_SECRET}

logging:
  level:
    org.springframework.cloud.gateway: INFO