server:
  port: 8080

spring:
  application:
    name: products-service

  datasource:
    url: jdbc:postgresql://localhost:5432/products_db
    username: products_user
    password: products_pass

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: "*"

api:
  key:
    secret: ${API_KEY_SECRET:local-dev-key}

logging:
  level:
    root: INFO
